<div class="h-40 bg-gray-200 w-full relative">
  <img class="w-full h-full object-cover"
      (error)="onImgError($event)"
      [src]="training.image" 
      [alt]="training.name"
      draggable="false">
</div>

<div class="p-5 flex-1 flex flex-col">
  <h3 class="text-xl font-bold text-gray-800 mb-2">{{ training.name }}</h3>
  <div class="text-sm text-gray-600 mb-4 flex-1">
    <p class="mb-1"><span class="font-semibold text-gray-700">Edző:</span> {{ training.trainer.name }}</p>
    <p class="mb-1"><span class="font-semibold text-gray-700">Időpont:</span> {{ training.startTime | date:'short' }} -
      {{ training.endTime | date:'shortTime' }}</p>
    <p><span class="font-semibold text-gray-700">Max résztvevő:</span> {{ training.maxParticipant }} fő</p>
  </div>

  <a
    class="block text-center w-full py-2 border border-primary-600 text-primary-600 hover:border-primary-500 hover:text-primary-500 rounded font-semibold transition-colors cursor-pointer"
    (click)="preserveListState()"
    [routerLink]="['/trainings', training.id]">
    Részletek
</a>
</div>
