<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/30 dark:bg-black/60 backdrop-blur-sm p-4 transition-colors duration-300 ease-in-out"
  (mousedown)="onBackdropMouseDown($event)"
  (click)="onBackdropClick($event)"
  >

  <div class="bg-white dark:bg-gray-900 rounded-lg shadow-xl w-full max-w-lg p-6 relative flex flex-col max-h-[90vh] transition-colors duration-300 ease-in-out"
    (mousedown)="$event.stopPropagation()"
    (click)="$event.stopPropagation()"
    >

    <button (click)="closeModal()" class="absolute top-4 right-4 text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 cursor-pointer z-10 transition-colors duration-300 ease-in-out">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>

    <div class="shrink-0">
      <h2 class="text-2xl font-bold mb-2 text-gray-800 dark:text-gray-100 transition-colors duration-300 ease-in-out">Jegyválasztás</h2>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-4 transition-colors duration-300 ease-in-out">Kérlek válaszd ki, milyen jeggyel/bérlettel szeretnél részt venni az edzésen.</p>
    </div>

    <div class="space-y-3 mb-2 overflow-y-auto flex-1 pr-2">
      @for (ticket of tickets; track ticket.id) {
        <div (click)="selectTicket(ticket.id)" 
          class="border-2 rounded-lg p-4 flex flex-col cursor-pointer transition-colors duration-300 ease-in-out hover:border-primary-400 dark:hover:border-primary-500"
          [ngClass]="{
            'border-primary-600 dark:border-primary-500 bg-primary-50 dark:bg-primary-900/30': selectedTicketId === ticket.id,
            'border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800': selectedTicketId !== ticket.id
          }">
          
          <div class="flex justify-between items-start mb-2">
            <span class="text-sm font-bold text-gray-800 dark:text-gray-100 transition-colors duration-300 ease-in-out">{{ ticket.description }}</span>
            <span 
              class="text-xs text-white py-1 px-2 rounded font-semibold transition-colors duration-300 ease-in-out"
              [ngClass]="{
                'bg-primary-600 dark:bg-primary-500': selectedTicketId === ticket.id,
                'bg-primary-500/40 dark:bg-primary-500/40': selectedTicketId !== ticket.id
              }">
              {{ ticket.price | number:'1.0-0' }} Ft
            </span>
          </div>
          
          <div class="text-xs text-gray-500 dark:text-gray-400 flex justify-between mt-1 border-t border-gray-200/50 dark:border-gray-700/50 pt-2 transition-colors duration-300 ease-in-out">
            <span>Diák: {{ ticket.isStudent ? 'Igen' : 'Nem' }}</span>
            <span>Felhasználható: {{ ticket.maxUsage }}x</span>
          </div>
        </div>
      }
    </div>

    <div class="flex justify-end gap-3 shrink-0 pt-4 border-t border-gray-100 dark:border-gray-800 mt-2 transition-colors duration-300 ease-in-out">
      <button (click)="closeModal()"
        class="px-4 py-2 bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 font-medium rounded hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors duration-300 ease-in-out cursor-pointer">
        Mégse
      </button>

      <button (click)="onSubmitApplication()" [disabled]="!selectedTicketId || isSubmitting"
        class="px-4 py-2 bg-primary-600 dark:bg-primary-600 text-white font-medium rounded hover:bg-primary-500 dark:hover:bg-primary-500 transition-colors duration-300 ease-in-out disabled:opacity-50 cursor-pointer disabled:cursor-not-allowed flex items-center">
        @if (isSubmitting) {
          <svg class="animate-spin h-5 w-5 mr-2 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        }
        Jelentkezem
      </button>
    </div>

  </div>
</div>
