<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/40 dark:bg-black/70 backdrop-blur-sm transition-all duration-300">
  
  <div class="bg-white dark:bg-gray-900 w-full max-w-md rounded-3xl shadow-2xl border border-gray-200 dark:border-gray-800 overflow-hidden transform transition-all duration-300">
    
    <div class="p-6 border-b border-gray-100 dark:border-gray-800 transition-colors">
      <div class="flex justify-between items-start mb-2">
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white tracking-tight leading-tight pr-4">
          {{ ticket.description }}
        </h2>
        @if (ticket.isStudent) {
          <span class="shrink-0 bg-blue-500/10 text-blue-600 dark:text-blue-400 text-xs font-bold px-3 py-1 rounded-full border border-blue-500/20 uppercase tracking-wider mt-1">
            Student
          </span>
        }
        
      </div>
    </div>

    <div class="p-6 bg-white dark:bg-gray-900 transition-colors">
      <ul class="space-y-4">
        
        <li class="flex items-center justify-between">
          <div class="flex items-center text-gray-600 dark:text-gray-400">
            <svg class="w-5 h-5 mr-3 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
            <span class="text-sm font-medium">Ennyiszer használható</span>
          </div>
          <strong class="text-gray-900 dark:text-white font-bold">{{ ticket.maxUsage || 'Korlátlan' }}</strong>
        </li>

        @if (ticket.trainingId) {
            <li class="flex items-center justify-between">
                <div class="flex items-center text-gray-600 dark:text-gray-400">
                    <svg class="w-5 h-5 mr-3 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                    <span class="text-sm font-medium">Edzés</span>
                </div>
                <strong class="text-gray-900 dark:text-white font-bold text-right pl-4">{{ ticket.trainingName }}</strong>
            </li>
        }

        <li class="pt-4 border-t border-gray-100 dark:border-gray-800 mt-4">
          <label class="flex items-center justify-between p-3 rounded-xl bg-gray-50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 cursor-pointer group hover:border-primary-500/50 transition-all">
            <div class="flex items-center gap-3">
              <div class="relative flex items-center justify-center">
                <input type="checkbox" id="payNow" [(ngModel)]="isPaid"
                  class="peer appearance-none w-5 h-5 border-2 border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-800 checked:bg-primary-500 checked:border-primary-500 focus:outline-none transition-all cursor-pointer" />
                <svg class="absolute w-3 h-3 text-white opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
              </div>
              <span class="text-sm font-semibold text-gray-700 dark:text-gray-300 group-hover:text-gray-900 dark:group-hover:text-white transition-colors">Fizetés azonnal</span>
            </div>
            <span class="text-xs text-gray-400 italic">Nem kötelező</span>
          </label>
          <p class="mt-2 text-[13px] text-gray-500 dark:text-gray-400 px-1">Bepipálás esetén szükséges most fizetni.</p>
        </li>
        
        <li class="flex items-center justify-between pt-4 border-t border-gray-100 dark:border-gray-800 mt-4">
          <span class="text-gray-500 dark:text-gray-400 text-sm font-medium">Teljes ár</span>
          <span class="text-3xl font-black text-gray-900 dark:text-white">{{ ticket.price }} Ft</span>
        </li>
      </ul>
    </div>

    <div class="p-6 flex flex-col-reverse sm:flex-row gap-3 bg-gray-50 dark:bg-gray-800/50 border-t border-gray-100 dark:border-gray-800 transition-colors">
      
      <button 
        (click)="closeModal()" 
        type="button" 
        class="w-full sm:w-1/2 px-5 py-3 text-sm font-medium text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white bg-white dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl transition-all focus:outline-none focus:ring-2 focus:ring-gray-300 cursor-pointer">
        Mégse
      </button>
      
      <button 
        (click)="buyTicket()" 
        type="button" 
        class="w-full sm:w-1/2 px-5 py-3 text-sm font-bold text-white bg-primary-500 hover:bg-primary-600 rounded-xl shadow-lg shadow-primary-500/20 transition-all focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 focus:ring-offset-white dark:focus:ring-offset-gray-900 cursor-pointer">
        Vásárlás
      </button>
      
    </div>
    
  </div>
</div>
