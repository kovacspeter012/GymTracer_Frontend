<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm transition-opacity">
  
  <div class="bg-gray-800 w-full max-w-md rounded-3xl shadow-2xl border border-gray-700 overflow-hidden transform transition-all">
    
    <div class="p-6 border-b border-gray-700 bg-gray-800 flex items-center justify-between">
      <h2 class="text-xl font-bold text-white tracking-tight">Payment Details</h2>
      <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
      </svg>
    </div>

    <form class="p-6 bg-gray-800/50 space-y-5">
      
      <div>
        <label for="cardName" class="block text-sm font-medium text-gray-400 mb-1.5">Name on Card</label>
        <input 
          type="text" 
          id="cardName" 
          placeholder="Jane Doe" 
          class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:border-primary-500 focus:ring-1 focus:ring-primary-500 outline-none transition-colors"
          required
        />
      </div>

      <div>
        <label for="cardNumber" class="block text-sm font-medium text-gray-400 mb-1.5">Card Number</label>
        <div class="relative">
          <input 
            type="text" 
            id="cardNumber" 
            placeholder="0000 0000 0000 0000" 
            maxlength="19"
            class="w-full bg-gray-900 border border-gray-700 rounded-xl pl-12 pr-4 py-3 text-white placeholder-gray-600 focus:border-primary-500 focus:ring-1 focus:ring-primary-500 outline-none transition-colors tracking-widest font-mono text-sm"
            required
          />
          <svg class="absolute left-4 top-1/2 transform -translate-y-1/2 w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path>
          </svg>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label for="cardExpiry" class="block text-sm font-medium text-gray-400 mb-1.5">Expiry Date</label>
          <input 
            type="text" 
            id="cardExpiry" 
            placeholder="MM/YY" 
            maxlength="5"
            class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:border-primary-500 focus:ring-1 focus:ring-primary-500 outline-none transition-colors text-center font-mono text-sm"
            required
          />
        </div>

        <div>
          <label for="cardCvc" class="block text-sm font-medium text-gray-400 mb-1.5">CVC</label>
          <div class="relative">
            <input 
              type="text" 
              id="cardCvc" 
              placeholder="123" 
              maxlength="4"
              class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:border-primary-500 focus:ring-1 focus:ring-primary-500 outline-none transition-colors text-center font-mono text-sm"
              required
            />
            <svg class="absolute right-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-600 cursor-help" fill="none" stroke="currentColor" viewBox="0 0 24 24" title="3 or 4 digits on the back of your card">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
          </div>
        </div>
      </div>
      
    </form>

    <div class="p-6 bg-gray-900 border-t border-gray-700">
      
      <p class="text-xs text-gray-500 text-center mb-4 flex items-center justify-center gap-1.5">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
        Payments are secure and encrypted
      </p>

      <div class="flex flex-col-reverse sm:flex-row gap-3">
        <button type="button" class="w-full sm:w-1/3 px-5 py-3 text-sm font-medium text-gray-300 hover:text-white bg-gray-800 hover:bg-gray-700 border border-gray-600 rounded-xl transition-colors focus:outline-none focus:ring-2 focus:ring-gray-600">
          Mégse
        </button>
        
        <button type="button" class="w-full sm:w-2/3 flex justify-center items-center gap-2 px-5 py-3 text-sm font-bold text-white bg-primary-500 hover:bg-primary-600 rounded-xl shadow-lg shadow-primary-500/20 transition-all focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 focus:ring-offset-gray-900">
          <span>Fizetés</span>
          <span>•</span>
          <span>HUF 20,000</span>
        </button>
      </div>
    </div>
    
  </div>
</div>
