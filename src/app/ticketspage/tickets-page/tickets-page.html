<div class="w-full mx-auto p-4 sm:p-6 lg:p-8 space-y-12 bg-gray-800 min-h-screen font-sans">

    <section>
        <h2 class="text-2xl font-bold text-white mb-6 border-b border-gray-700 pb-2">Saját Jegyek</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div
                class="relative bg-linear-to-br from-gray-800 to-gray-900 border border-primary-500/30 p-6 rounded-2xl shadow-lg overflow-hidden">
                <div class="absolute top-0 right-0 w-2 h-full bg-primary-500"></div>

                <h3 class="text-lg font-bold text-white mb-1">Monthly Unlimited Pass</h3>
                <p class="text-sm text-gray-400 mb-4">Valid until: May 1, 2026</p>

                <div
                    class="inline-block bg-primary-500/10 text-primary-400 font-mono text-sm px-3 py-1 rounded-lg border border-primary-500/20">
                    Remaining: Unlimited
                </div>
            </div>
        </div>
    </section>


    <section>
        <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-6 border-b border-gray-700 pb-2 gap-4">
            <h2 class="text-2xl font-bold text-white">Standard Jegyek</h2>

            <label class="flex items-center space-x-3 cursor-pointer group">
                <div class="relative flex items-center justify-center">
                    <input type="checkbox" id="studentFilter" [(ngModel)]="showStandardStudentTickets"
                        class="peer appearance-none w-5 h-5 border-2 border-gray-500 rounded bg-gray-800 checked:bg-primary-500 checked:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 focus:ring-offset-gray-900 transition-colors cursor-pointer" />
                    <svg class="absolute w-3.5 h-3.5 text-white opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity"
                        fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                <span class="text-sm font-medium text-gray-400 group-hover:text-gray-200 transition-colors">Show Student
                    Passes</span>
            </label>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

            @for (ticket of standardTickets; track $index) {
                <app-tickets-card [ticket]="ticket"></app-tickets-card>
            }

        </div>
    </section>


    <section>
        <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-6 border-b border-gray-700 pb-2 gap-4">
            <h2 class="text-2xl font-bold text-white">Edzések</h2>

            <label class="flex items-center space-x-3 cursor-pointer group">
                <div class="relative flex items-center justify-center">
                    <input type="checkbox" id="studentFilter" [(ngModel)]="showTrainingStudentTickets" (ngModelChange)="refreshTickets()"
                        class="peer appearance-none w-5 h-5 border-2 border-gray-500 rounded bg-gray-800 checked:bg-primary-500 checked:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 focus:ring-offset-gray-900 transition-colors cursor-pointer" />
                    <svg class="absolute w-3.5 h-3.5 text-white opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity"
                        fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                <span class="text-sm font-medium text-gray-400 group-hover:text-gray-200 transition-colors">Show Student
                    Passes</span>
            </label>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            

            @for (ticket of trainingTickets; track $index) {
                <app-tickets-card [ticket]="ticket"></app-tickets-card>
            }
        </div>
    </section>

</div>
