<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm transition-opacity">
  
  <div class="bg-gray-800 w-full max-w-sm rounded-3xl shadow-2xl border border-gray-700 overflow-hidden p-6 text-center transform transition-all">
    
    <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-500/10 mb-6">
      <svg class="h-8 w-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
      </svg>
    </div>

    <h3 class="text-xl font-bold text-white mb-2">Felhasználó Törlése</h3>
    <p class="text-sm text-gray-400 mb-8">
      Biztos, hogy törli szeretné a(z) <span class="font-bold text-gray-200">{{authService.actingUser?.name}}</span> felhasználót? Ezt a műveletet nem lehet visszavonni és minden hozzá tartozó kártya és bérlet is törlődni fog.
    </p>

    <div class="flex flex-col-reverse sm:flex-row gap-3 justify-center">
      <button 
        (click)="CancelClick()" 
        type="button" 
        class="w-full sm:w-auto px-5 py-2.5 text-sm font-medium text-gray-300 hover:text-white bg-gray-700/50 hover:bg-gray-700 rounded-xl transition-colors focus:outline-none focus:ring-2 focus:ring-gray-600 hover:cursor-pointer">
        Mégse
      </button>
      
      <button 
        (click)="DeleteClick()" 
        type="button" 
        class="w-full sm:w-auto px-5 py-2.5 text-sm font-bold text-white bg-red-600 hover:bg-red-700 rounded-xl shadow-lg shadow-red-600/20 transition-all focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 focus:ring-offset-gray-800 hover:cursor-pointer">
        Igen, Törlöm
      </button>
    </div>
    
  </div>
</div>
