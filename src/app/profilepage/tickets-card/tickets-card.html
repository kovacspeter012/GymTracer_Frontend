<div
    class="relative flex flex-col h-full bg-linear-to-br from-gray-200 to-gray-100 dark:from-gray-800 dark:to-gray-900 border border-primary-500/30 p-6 rounded-2xl shadow-lg overflow-hidden transition-colors duration-300 ease-in-out">
    
    <div class="absolute top-0 right-0 w-2 h-full bg-primary-500"></div>

    <h3 class="text-lg font-bold text-black dark:text-gray-100 mb-1 transition-colors duration-300 ease-in-out">
        {{ticket!.description}}
    </h3>
    
    <p class="text-sm text-gray-600 dark:text-gray-400 mb-4 transition-colors duration-300 ease-in-out">
        Érvényes: {{ ticket!.expirationDate | date:'yyyy. MM. dd.':'':'hu' }}
    </p>

    <div class="flex items-center justify-between gap-4 mt-auto pt-6 min-h-[64px]">
        <div
            class="inline-block bg-primary-500/10 dark:bg-primary-500/20 text-primary-600 dark:text-primary-400 font-mono text-sm px-3 py-1 rounded-lg border border-primary-500/20 dark:border-primary-500/30 transition-colors duration-300 ease-in-out">
            Használható még: {{ticket.usagesLeft === null ? 'Korlátlan' : ticket.usagesLeft}}
        </div>
        
        @if (!ticket!.isPayed) {
            <button (click)="localPay.emit(ticket)" [disabled]="isPaying"
                class="shrink-0 bg-primary-600 hover:bg-primary-500 text-white px-3 py-2.5 rounded-xl font-medium transition-colors text-sm shadow-md hover:cursor-pointer items-center justify-center inline-flex disabled:opacity-70 disabled:cursor-not-allowed">
                
                @if (isPaying) {
                    <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Fizetés...
                } @else {
                    Helyi fizetés
                }
                
            </button>
        }
    </div>
</div>
