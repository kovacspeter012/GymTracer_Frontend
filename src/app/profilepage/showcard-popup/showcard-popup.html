<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-white/80 backdrop-blur-sm transition-opacity">
  
  <div class="bg-gray-200 w-full max-w-lg rounded-3xl shadow-2xl border border-gray-300 overflow-hidden transform transition-all p-7 text-center">
    
    <div class="mb-6 pb-4 border-b border-gray-300">
      <h2 class="text-xl font-bold text-black tracking-tight">Kártya</h2>
      <p class="text-xs text-gray-500 mt-1 uppercase tracking-widest">Tartsa a leolvasóhoz vagy mutassa meg kollégánknak</p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-inner inline-block mb-7 border-4 border-orange-500/20">
      <qrcode 
        [qrdata]="cardData!.code" 
        [width]="350" 
        [errorCorrectionLevel]="'M'"
        colorDark="#000000"
        colorLight="#ffffff"
        class="block w-full"
      ></qrcode>
    </div>
    
    <div class="mb-8">
        <p class="text-sm font-semibold text-gray-200">Létrehozva: {{ cardData!.createdAt | date:'short':'':'hu' }}</p>
    </div>

    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      
      <button 
        (click)="deleteCard()" 
        type="button" 
        class="flex-1 px-5 py-2.5 text-sm font-bold text-white bg-primary-500 hover:bg-primary-600 rounded-xl shadow-lg shadow-primary-500/20 transition-all focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 focus:ring-offset-gray-800 hover:cursor-pointer">
        Kártya Törlése
      </button>

      <button 
        (click)="closeModal()" 
        type="button" 
        class="flex-1 px-5 py-2.5 text-sm font-medium text-gray-700 hover:text-black bg-gray-400/50 hover:bg-gray-400 rounded-xl transition-colors focus:outline-none focus:ring-2 focus:ring-gray-600 hover:cursor-pointer">
        Bezár
      </button>

    </div>
    
  </div>
</div>
