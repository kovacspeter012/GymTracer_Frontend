<div class="bg-gray-900/50 p-5 rounded-2xl border border-gray-700/50" [ngClass]="theme.getColor()">
    <div class="flex items-center justify-between mb-4">
    <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">Kártyák</p>
    <span class="text-xs font-medium bg-gray-700 text-gray-300 px-2 py-1 rounded-md">{{ cardsOfUser.length }} Aktív</span>
    </div>
    
    <div class="flex flex-wrap gap-4">
        @for (card of cardsOfUser; track $index) {
            <div class="px-5 py-3 bg-gray-800 border border-gray-600 hover:border-orange-500 transition-colors rounded-xl text-white font-mono text-sm shadow-sm flex items-center gap-3 cursor-default">
                <svg class="w-5 h-5 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                Kártya #{{ $index + 1 }} <br> Létrehozva: {{ card.createdAt | date:'short':'':'hu' }}
            </div>
        }
    </div>
</div>
