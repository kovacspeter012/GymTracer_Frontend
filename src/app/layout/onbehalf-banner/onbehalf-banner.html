@if (auth.pretendedUser) {
  <div class="w-full bg-orange-500 text-white px-4 pb-2 pt-4 flex items-center justify-between text-sm font-semibold z-10 rounded-b-md shadow">
    <div class="flex items-center gap-2">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
      </svg>
      <span>Megtekintés: <strong>{{ auth.pretendedUser.name }}</strong> nevében</span>
    </div>
    <button (click)="exit()" class="ml-4 px-3 py-1.5 bg-white/20 hover:bg-white/30 rounded transition-colors cursor-pointer text-xs font-bold uppercase tracking-wide self-center">
      Kilépés
    </button>
  </div>
}
