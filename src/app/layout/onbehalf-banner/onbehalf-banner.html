@if (auth.pretendedUser) {
  <div class="w-full bg-orange-600 dark:bg-orange-500/90 dark:backdrop-blur-md text-white px-4 pb-2 pt-4 flex items-center justify-between text-sm font-semibold z-50 rounded-b-md shadow-lg transition-colors">
    <div class="flex items-center gap-2">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
      </svg>
      <span>Megtekintés: <span class="font-extrabold underline decoration-white/40 underline-offset-2">{{ auth.pretendedUser.name }}</span> nevében</span>
    </div>
    <button (click)="exit()" class="ml-4 px-3 py-1.5 bg-white/20 hover:bg-white/30 dark:bg-black/20 dark:hover:bg-black/40 rounded transition-all cursor-pointer text-xs font-bold uppercase tracking-wide self-center border border-white/10">
      Kilépés
    </button>
  </div>
}
