<header class="min-h-20 max-md:h-auto z-20 whitespace-nowrap relative">
  
  <div class="md:hidden absolute w-full border-b border-gray-800/50 shadow-lg h-6 top-18 -mt-6 z-50 transition-all duration-300 ease-out origin-center" 
       [ngClass]="menuOpen ? 'scale-x-100 opacity-100' : 'scale-x-0 opacity-0'">
  </div>

  <nav class="flex flex-col md:flex-row md:justify-between md:items-center bg-red-600 shadow-xl rounded-b-lg min-h-18 md:h-18 p-0 md:px-2 cursor-default"
  >
    
    <div class="flex justify-between items-center w-full md:w-auto h-18 px-4 md:px-2 select-none shrink-0">
      <a class="flex items-center space-x-2" routerLink="/">
        <img ngSrc="images/GymTracer_logo.svg" width="50" height="50" priority alt="GymTracer Logo"  draggable="false">
        <p class="text-2xl font-bold">GymTracer</p>
      </a>

      <button class="md:hidden p-2 rounded focus:outline-none" (click)="toggleMenu()">
        <img class="w-8 h-8" src="images/hamburger.svg" alt="Menu icon"/>
      </button>
    </div>

    <div class="w-full md:w-auto md:h-full max-md:grid max-md:transition-all max-md:duration-300 max-md:ease-in-out"
         [ngClass]="menuOpen ? 'max-md:grid-rows-[1fr] max-md:opacity-100' : 'max-md:grid-rows-[0fr] max-md:opacity-0'">
      
      <div class="overflow-hidden md:overflow-visible flex flex-col md:flex-row select-none max-md:bg-red-500 rounded-b-lg md:h-full md:items-center">
        <a class="nav-element" routerLink="/">Kezdőlap</a>
        <a class="nav-element" routerLink="/">Kezdőlap</a>
        <a class="nav-element" routerLink="/">Kezdőlap</a>
      </div>
      
    </div>
  </nav>

  <!-- <div class="h-2"></div> -->
</header>
